<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard de Prospecção — Vilas do Atlântico</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --border: #252a3a;
    --accent: #00e5a0;
    --accent2: #ff6b35;
    --accent3: #7c6aff;
    --text: #e8eaf0;
    --muted: #6b7280;
    --p1: #00e5a0;
    --p2: #fbbf24;
    --p3: #ef4444;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-title {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
    flex: 1;
  }
  .header-meta {
    color: var(--muted);
    font-size: 11px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat {
    flex: 1;
    background: var(--surface);
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
  }
  .stat-label { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  .stat-num.green { color: var(--p1); }
  .stat-num.yellow { color: var(--p2); }
  .stat-num.orange { color: var(--accent2); }
  .stat-num.purple { color: var(--accent3); }

  /* TOOLBAR */
  .toolbar {
    padding: 14px 28px;
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .search-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    width: 220px;
    outline: none;
    transition: border-color .2s;
  }
  .search-box:focus { border-color: var(--accent); }
  .search-box::placeholder { color: var(--muted); }

  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 14px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,160,0.07);
  }

  .spacer { flex: 1; }

  .export-btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 7px 16px;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: opacity .2s;
  }
  .export-btn:hover { opacity: 0.85; }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 190px 1fr 360px;
    height: calc(100vh - 178px);
  }

  /* TABLE SECTION */
  .table-section {
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  /* NICHO GROUP */
  .nicho-group { border-bottom: 1px solid var(--border); }
  .nicho-header {
    padding: 10px 20px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 10;
    cursor: pointer;
    user-select: none;
  }
  .nicho-header:hover { background: #1e2436; }
  .nicho-icon { font-size: 14px; }
  .nicho-name {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .nicho-count {
    background: var(--border);
    border-radius: 10px;
    padding: 2px 8px;
    font-size: 10px;
    color: var(--muted);
    margin-left: auto;
  }
  .nicho-chevron { color: var(--muted); font-size: 10px; }

  /* TABLE */
  table { width: 100%; border-collapse: collapse; }
  th {
    padding: 8px 14px;
    text-align: left;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tr.lead-row {
    border-bottom: 1px solid rgba(37,42,58,0.6);
    cursor: pointer;
    transition: background .15s;
  }
  tr.lead-row:hover { background: rgba(255,255,255,0.03); }
  tr.lead-row.selected { background: rgba(0,229,160,0.06); }
  td {
    padding: 9px 14px;
    vertical-align: middle;
  }
  .lead-name {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }
  .lead-phone {
    color: var(--muted);
    font-size: 11px;
  }

  /* PRIORITY BADGE */
  .priority {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }
  .p1 { background: rgba(0,229,160,0.12); color: var(--p1); border: 1px solid rgba(0,229,160,0.3); }
  .p2 { background: rgba(251,191,36,0.12); color: var(--p2); border: 1px solid rgba(251,191,36,0.3); }
  .p3 { background: rgba(239,68,68,0.12); color: var(--p3); border: 1px solid rgba(239,68,68,0.3); }

  /* STATUS BADGE */
  .status {
    display: inline-block;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    border: 1px solid;
  }
  .s-nao-contatado { background: rgba(107,114,128,0.1); color: var(--muted); border-color: rgba(107,114,128,0.3); }
  .s-contatado { background: rgba(124,106,255,0.12); color: var(--accent3); border-color: rgba(124,106,255,0.3); }
  .s-interesse { background: rgba(251,191,36,0.12); color: var(--p2); border-color: rgba(251,191,36,0.3); }
  .s-reuniao { background: rgba(255,107,53,0.12); color: var(--accent2); border-color: rgba(255,107,53,0.3); }
  .s-fechado { background: rgba(0,229,160,0.12); color: var(--p1); border-color: rgba(0,229,160,0.3); }
  .s-sem-interesse { background: rgba(239,68,68,0.12); color: var(--p3); border-color: rgba(239,68,68,0.3); }

  /* STARS */
  .stars { color: var(--p2); font-size: 11px; letter-spacing: -1px; }
  .stars-count { color: var(--muted); font-size: 10px; margin-left: 3px; }

  /* DETAIL PANEL */
  .detail-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
  }
  .detail-empty-icon { font-size: 36px; opacity: 0.3; }
  .detail-empty-text { font-size: 12px; }

  .detail-content {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: none;
    flex-direction: column;
    gap: 18px;
  }
  .detail-content.visible { display: flex; }

  .detail-top {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .detail-nicho-tag {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
  }
  .detail-name {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    line-height: 1.2;
  }
  .detail-addr { color: var(--muted); font-size: 11px; line-height: 1.5; }

  .detail-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .detail-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    min-width: 70px;
  }

  /* FIELD SECTIONS */
  .section-title {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  /* STATUS SELECTOR */
  .status-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
  }
  .status-opt {
    padding: 6px 10px;
    border-radius: 5px;
    font-size: 10px;
    text-align: center;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all .15s;
    font-family: 'DM Mono', monospace;
  }
  .status-opt:hover, .status-opt.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,160,0.07);
  }

  /* PRIORITY SELECTOR */
  .priority-grid {
    display: flex;
    gap: 6px;
  }
  .priority-opt {
    flex: 1;
    padding: 6px;
    border-radius: 5px;
    font-size: 10px;
    text-align: center;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--muted);
    transition: all .15s;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
  }
  .priority-opt.p1-opt:hover, .priority-opt.p1-opt.active { border-color: var(--p1); color: var(--p1); background: rgba(0,229,160,0.07); }
  .priority-opt.p2-opt:hover, .priority-opt.p2-opt.active { border-color: var(--p2); color: var(--p2); background: rgba(251,191,36,0.07); }
  .priority-opt.p3-opt:hover, .priority-opt.p3-opt.active { border-color: var(--p3); color: var(--p3); background: rgba(239,68,68,0.07); }

  /* NOTES TEXTAREA */
  .notes-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    width: 100%;
    min-height: 90px;
    resize: vertical;
    outline: none;
    transition: border-color .2s;
    line-height: 1.6;
  }
  .notes-field:focus { border-color: var(--accent); }
  .notes-field::placeholder { color: var(--muted); }

  /* SCRIPT SECTION */
  .script-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent3);
    border-radius: 6px;
    padding: 12px;
    font-size: 11px;
    line-height: 1.8;
    color: #c8cfe0;
    white-space: pre-wrap;
    position: relative;
  }
  .copy-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: var(--border);
    border: none;
    border-radius: 4px;
    padding: 3px 8px;
    color: var(--muted);
    font-size: 9px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    transition: all .15s;
    text-transform: uppercase;
  }
  .copy-btn:hover { color: var(--accent); }

  /* SAVE BTN */
  .save-btn {
    background: var(--accent);
    border: none;
    border-radius: 6px;
    padding: 10px;
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: opacity .2s;
  }
  .save-btn:hover { opacity: 0.85; }
  .save-btn:active { transform: scale(0.99); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  /* COLLAPSED — handled by max-height transition below */

  .tel-link { color: var(--accent); text-decoration: none; }
  .tel-link:hover { text-decoration: underline; }

  .links-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .link-chip {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 3px 9px;
    border-radius: 4px;
    font-size: 10px;
    text-decoration: none;
    border: 1px solid;
    transition: opacity .15s;
    white-space: nowrap;
    font-family: 'DM Mono', monospace;
  }
  .link-chip:hover { opacity: 0.75; }
  .link-chip.ig { color: #e879f9; border-color: rgba(232,121,249,0.35); background: rgba(232,121,249,0.07); }
  .link-chip.site { color: var(--accent3); border-color: rgba(124,106,255,0.35); background: rgba(124,106,255,0.07); }
  .link-chip.maps { color: #60a5fa; border-color: rgba(96,165,250,0.35); background: rgba(96,165,250,0.07); }

  .table-links { display: flex; gap: 4px; margin-top: 3px; }

  .rating-row { display: flex; align-items: center; gap: 4px; }

  .saved-toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    color: #000;
    padding: 10px 18px;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    opacity: 0;
    transform: translateY(10px);
    transition: all .3s;
    pointer-events: none;
    z-index: 999;
  }
  .saved-toast.show { opacity: 1; transform: translateY(0); }

  /* ══════════════════════════════════════════
     FLUID — escala para qualquer tela
     Sem breakpoints fixos. Layout reage ao
     espaço real disponível via clamp() e
     ResizeObserver no JS.
  ══════════════════════════════════════════ */

  /* Tipografia e espaçamento fluidos */
  body          { font-size: clamp(11px, 1.3vw, 13px); }
  .header       { padding: clamp(10px,2vw,18px) clamp(14px,3vw,28px); gap: clamp(8px,1.5vw,20px); }
  .header-title { font-size: clamp(13px, 2vw, 18px); }
  .header-meta  { font-size: clamp(9px, 1vw, 11px); }

  /* Stats: cada card tem mínimo 120px, envolve naturalmente */
  .stats-bar { flex-wrap: wrap; }
  .stat       { flex: 1 1 120px; padding: clamp(10px,1.5vw,14px) clamp(12px,2vw,20px); }
  .stat-num   { font-size: clamp(16px, 2.5vw, 22px); }

  /* Pipeline: legenda some quando espaço < 600px */
  .pipeline-bar    { padding: clamp(8px,1.5vw,10px) clamp(14px,3vw,28px); }
  .pipeline-legend { display: flex; overflow: hidden; max-width: clamp(0px, 60vw, 999px); }

  /* Toolbar fluida */
  .toolbar {
    padding: clamp(8px,1.5vw,14px) clamp(12px,2.5vw,28px);
    gap: clamp(6px,1vw,10px);
    flex-wrap: nowrap;
  }
  .search-box   { width: clamp(140px, 20vw, 220px); }
  .filter-btn   { font-size: clamp(10px, 1.1vw, 11px); padding: clamp(5px,0.8vw,7px) clamp(8px,1.2vw,14px); }
  .export-btn   { font-size: clamp(10px, 1vw, 11px); padding: clamp(5px,0.8vw,7px) clamp(10px,1.5vw,16px); white-space: nowrap; }

  /* Grid principal: painel encolhe com a tela (mín 260px) */
  .main {
    grid-template-columns: 190px 1fr clamp(260px, 28vw, 380px);
    height: calc(100dvh - var(--chrome-h, 175px));
  }

  /* Tabela fluida */
  th, td        { padding: clamp(6px,1vw,9px) clamp(8px,1.2vw,14px); }
  .lead-name    { font-size: clamp(10px, 1.2vw, 12px); }
  .detail-content { padding: clamp(12px,2vw,20px); gap: clamp(12px,1.5vw,18px); }
  .detail-name  { font-size: clamp(13px, 2vw, 16px); }

  /* ── MODO DRAWER (classe adicionada pelo ResizeObserver) ──
     Ativa quando a viewport é estreita demais para duas colunas */

  /* Overlay */
  .mobile-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.52);
    z-index: 199;
  }
  .mobile-overlay.show { display: block; }

  /* Botão fechar — oculto por padrão, só no drawer */
  .mobile-close-btn {
    display: none;
    position: absolute;
    top: 16px; right: 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    font-family: 'DM Mono', monospace;
    z-index: 10;
    align-items: center;
    gap: 5px;
  }

  /* Drawer ativo */
  body.drawer-mode .main {
    display: flex;
    flex-direction: column;
    height: auto;
  }
  body.drawer-mode .table-section {
    overflow-x: auto;
    border-right: none;
    min-height: calc(100dvh - var(--chrome-h, 175px));
  }
  body.drawer-mode table         { min-width: 500px; }
  body.drawer-mode .stars-count  { display: none; }
  body.drawer-mode .wpp-chip     { display: none; }
  body.drawer-mode .table-links  { display: none; }
  body.drawer-mode .pipeline-bar { display: none; }
  body.drawer-mode .search-box   { width: 100%; }
  body.drawer-mode .toolbar      { flex-direction: column; align-items: stretch; }
  body.drawer-mode .export-btn   { width: 100%; text-align: center; }
  body.drawer-mode .header-meta  { display: none; }

  /* Painel vira bottom sheet no drawer */
  body.drawer-mode .detail-panel {
    display: flex !important;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 72dvh;
    background: var(--surface);
    border-top: 2px solid var(--border);
    border-radius: 20px 20px 0 0;
    z-index: 200;
    transform: translateY(100%);
    transition: transform 0.32s cubic-bezier(.4,0,.2,1);
    box-shadow: 0 -10px 50px rgba(0,0,0,0.55);
    flex-direction: column;
    overflow: hidden;
  }
  body.drawer-mode .detail-panel::before {
    content: '';
    display: block;
    width: 38px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 12px auto 4px;
    flex-shrink: 0;
  }
  body.drawer-mode .detail-panel.mobile-open { transform: translateY(0); }
  body.drawer-mode .mobile-close-btn         { display: flex !important; }
  body.drawer-mode .saved-toast              { bottom: 74dvh; }

  /* ── HEADER GRADIENT BORDER ── */
  .header {
    overflow: hidden;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--accent) 30%, var(--accent3) 60%, var(--accent2) 80%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 4s linear infinite;
  }

  /* ── KEYFRAMES ── */
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(24px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(0,229,160,0); }
    50%       { box-shadow: 0 0 10px 3px rgba(0,229,160,0.45); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── STAT PROGRESS BAR ── */
  .stat-progress {
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-top: 8px;
    overflow: hidden;
  }
  .stat-progress-fill {
    height: 100%;
    border-radius: 1px;
    width: 0%;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
  }
  .stat-progress-fill.green-fill  { background: var(--p1); }
  .stat-progress-fill.yellow-fill { background: var(--p2); }
  .stat-progress-fill.orange-fill { background: var(--accent2); }
  .stat-progress-fill.purple-fill { background: var(--accent3); }

  /* ── PIPELINE BAR ── */
  .pipeline-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .pipeline-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    white-space: nowrap;
    flex-shrink: 0;
  }
  .pipeline-track {
    display: flex;
    flex: 1;

function renderStars(rating) {
  let html = '';
  for (let i = 1; i <= 5; i++) {
    if (i <= Math.floor(rating)) html += '<span class="star full">★</span>';
    else if (i === Math.ceil(rating) && rating % 1 >= 0.5) html += '<span class="star half">★</span>';
    else html += '<span class="star empty">☆</span>';
  }
  return html;
}

function renderPriority(p) {
  const map = { P1: ['p1','🔥 Alta'], P2: ['p2','⚡ Média'], P3: ['p3','❄️ Baixa'] };
  return `<span class="priority ${map[p][0]}">${map[p][1]}</span>`;
}

function renderStatus(s) {
  const map = {
    'nao-contatado': ['s-nao-contatado','Não contatado'],
    'contatado': ['s-contatado','Contatado'],
    'interesse': ['s-interesse','Demonstrou interesse'],
    'reuniao': ['s-reuniao','Reunião agendada'],
    'fechado': ['s-fechado','Fechado ✓'],
    'sem-interesse': ['s-sem-interesse','Sem interesse'],
  };
  const d = map[s] || map['nao-contatado'];
  return `<span class="status ${d[0]}" title="Clique para editar">${d[1]}</span>`;
}

function getVisibleLeads() {
  return leads.filter(l => {
    const matchNicho = currentFilter === 'todos' || l.nicho === currentFilter;
    const matchSearch = !searchQuery ||
      l.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
      l.phone.includes(searchQuery);
    const matchStage = currentStage === 'todos' || (l.customStatus || l.status) === currentStage;
    return matchNicho && matchSearch && matchStage;
  });
}

  const section = document.getElementById('tableSection');
  const visible = getVisibleLeads();

  // Group by nicho
  const grouped = {};
  nichos.forEach(n => {
    const gs = visible.filter(l => l.nicho === n.id);
    if (gs.length) grouped[n.id] = { meta: n, leads: gs };
  });

  if (!Object.keys(grouped).length) {
    section.innerHTML = `<div style="padding:40px;text-align:center;color:var(--muted)">Nenhum lead encontrado.</div>`;
    updateStats();
    return;
  }

  let html = '';
  for (const nid in grouped) {
    const g = grouped[nid];
    html += `
      <div class="nicho-group" id="ng-${nid}">
        <div class="nicho-header" onclick="toggleNicho('${nid}')">
          <span class="nicho-icon">${g.meta.icon}</span>

                <th>AVALIAÇÃO</th>
                <th>PRIORIDADE</th>
                <th>STATUS</th>
              </tr>
            </thead>
            <tbody>
    `;
    g.leads.forEach((l, rowIdx) => {
      const sel = selectedId === l.id ? ' selected' : '';

      if (l.instagram) tblLinks.push(`<a href="${l.instagram}" target="_blank" onclick="event.stopPropagation()" class="link-chip ig" style="font-size:9px;padding:1px 6px">📷 IG</a>`);
      if (l.site) tblLinks.push(`<a href="${l.site}" target="_blank" onclick="event.stopPropagation()" class="link-chip site" style="font-size:9px;padding:1px 6px">🌐</a>`);
      if (l.maps) tblLinks.push(`<a href="${l.maps}" target="_blank" onclick="event.stopPropagation()" class="link-chip maps" style="font-size:9px;padding:1px 6px">📍</a>`);
      const wppNum = l.phone.replace(/\D/g,'');
      const wppLink = wppNum && wppNum.length >= 10 ? `<a href="https://wa.me/55${wppNum}" target="_blank" onclick="event.stopPropagation()" class="wpp-chip" title="Abrir WhatsApp">💬 WPP</a>` : '';
      html += `
        <tr class="lead-row${sel}${noAnim?' no-anim':''}" id="row-${l.id}" onclick="selectLead(${l.id})" style="animation-delay:${noAnim?'0s':rowIdx * 0.03+'s'}">
          <td>
            <div class="lead-name">${l.name}</div>
            ${tblLinks.length ? `<div class="table-links">${tblLinks.join('')}</div>` : ''}
          </td>
          <td style="white-space:nowrap"><a class="tel-link" href="tel:${l.phone}">${l.phone}</a>${wppLink}</td>
          <td>
            <div class="rating-row">
              <span class="stars">${renderStars(l.rating)}</span>
              <span class="stars-count">${l.rating} (${l.reviews.toLocaleString('pt-BR')})</span>

  section.innerHTML = html;

function toggleNicho(nid) {
  const body = document.getElementById('nb-'+nid);
  const chev = document.getElementById('chev-'+nid);
  body.classList.toggle('collapsed');
  chev.classList.toggle('collapsed', body.classList.contains('collapsed'));
}

function updateStats() {
  const visible = getVisibleLeads();
  const total = visible.length;
  const p1 = visible.filter(l => (l.customPriority||l.priority) === 'P1').length;
  const contatados = visible.filter(l => ['contatado','interesse','reuniao'].includes(l.customStatus||l.status)).length;
  const fechados = visible.filter(l => (l.customStatus||l.status) === 'fechado').length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-p1').textContent = p1;
  document.getElementById('stat-contatados').textContent = contatados;
  document.getElementById('stat-fechados').textContent = fechados;

  // progress fills (relative to total)
  const pct = (v) => total ? Math.round(v / total * 100) : 0;
  requestAnimationFrame(() => {
    document.getElementById('prog-total').style.width = '100%';
    document.getElementById('prog-p1').style.width = pct(p1) + '%';
    document.getElementById('prog-contatados').style.width = pct(contatados) + '%';
    document.getElementById('prog-fechados').style.width = pct(fechados) + '%';
  });

  renderPipeline(visible);
  renderStageSidebar();
}

function renderPipeline(visible) {
  const stages = [
    { key: 'nao-contatado', label: 'Não contatado', color: '#6b7280' },
    { key: 'contatado',     label: 'Contatado',      color: '#7c6aff' },
    { key: 'interesse',     label: 'Interesse',       color: '#fbbf24' },
    { key: 'reuniao',       label: 'Reunião',         color: '#ff6b35' },
    { key: 'fechado',       label: 'Fechado',         color: '#00e5a0' },
  ];
  const total = visible.length || 1;
  const track = document.getElementById('pipelineTrack');
  const legend = document.getElementById('pipelineLegend');
  if (!track) return;

  track.innerHTML = stages.map(s => {
    const count = visible.filter(l => (l.customStatus||l.status) === s.key).length;
    const pct = Math.max(count / total * 100, count > 0 ? 1 : 0);
    return `<div class="pipeline-seg" style="width:${pct}%;background:${s.color}" title="${s.label}: ${count}"></div>`;
  }).join('');

  legend.innerHTML = stages.map(s => {
    const count = visible.filter(l => (l.customStatus||l.status) === s.key).length;
    return `<div class="pipeline-item"><span class="pipeline-dot" style="background:${s.color}"></span>${s.label} <strong>${count}</strong></div>`;
  }).join('');
}

function animateCounters(ids) {
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const target = parseInt(el.textContent) || 0;
    let cur = 0;
    const step = Math.max(1, Math.ceil(target / 22));
    const timer = setInterval(() => {
      cur = Math.min(cur + step, target);
      el.textContent = cur;
      if (cur >= target) clearInterval(timer);
    }, 28);
  });
}

  { key: 'sem-interesse', label: 'Sem interesse',      icon: '🚫', color: '#ef4444' },
];

function renderStageSidebar() {
  const sidebar = document.getElementById('stageSidebar');
  if (!sidebar) return;

  // Count against nicho+search but NOT stage (so all stage counts are visible)
  const base = leads.filter(l => {
    const matchNicho = currentFilter === 'todos' || l.nicho === currentFilter;
    const matchSearch = !searchQuery ||
      l.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
      l.phone.includes(searchQuery);
    return matchNicho && matchSearch;
  });

  sidebar.innerHTML = `<div class="stage-sidebar-title">Etapas</div>` +
    STAGE_LIST.map(s => {
      const count = s.key === 'todos'
        ? base.length
        : base.filter(l => (l.customStatus || l.status) === s.key).length;
      const active = currentStage === s.key ? ' active' : '';
      const divider = s.dividerBefore ? '<div class="stage-divider"></div>' : '';
      return `${divider}<div class="stage-item${active}" onclick="filterStage('${s.key}')" style="--stage-color:${s.color}">
        <span class="stage-icon">${s.icon}</span>
        <span class="stage-label">${s.label}</span>
        <span class="stage-count">${count}</span>
      </div>`;
    }).join('');
}

function filterStage(stage) {
  currentStage = stage;
  selectedId = null;
  renderTable();
}

// DETAIL PANEL
// ============================================================
function selectLead(id) {
  selectedId = id;
  document.querySelectorAll('.lead-row').forEach(r => r.classList.remove('selected'));
  const row = document.getElementById('row-'+id);
  if (row) row.classList.add('selected');
  renderDetail();
  if (isDrawer()) openMobilePanel();
}

function renderDetail() {
  const lead = getLead(selectedId);
  if (!lead) return;

  document.getElementById('detailEmpty').style.display = 'none';
  const content = document.getElementById('detailContent');
  content.style.display = 'flex';
  content.classList.add('visible');

  const nicho = nichos.find(n => n.id === lead.nicho);
  const script = (scripts[lead.nicho] || scripts.restaurante)(lead.name);

  const statusOpts = [
    ['nao-contatado','Não contatado'],
    ['contatado','Contatado'],
    ['interesse','Com interesse'],
    ['reuniao','Reunião agendada'],
    ['fechado','Fechado ✓'],
    ['sem-interesse','Sem interesse'],
  ];
  const priorityOpts = [['P1','🔥 Alta','p1-opt'],['P2','⚡ Média','p2-opt'],['P3','❄️ Baixa','p3-opt']];

  const curStatus = lead.customStatus || lead.status;
  const curPriority = lead.customPriority || lead.priority;

  const linksArr = [];
  if (lead.instagram) linksArr.push(`<a href="${lead.instagram}" target="_blank" class="link-chip ig">📷 Instagram</a>`);
  if (lead.site) linksArr.push(`<a href="${lead.site}" target="_blank" class="link-chip site">🌐 Site</a>`);
  if (lead.maps) linksArr.push(`<a href="${lead.maps}" target="_blank" class="link-chip maps">📍 Maps</a>`);
  const linksHtml = linksArr.length ? `<div class="links-row">${linksArr.join('')}</div>` : '<span style="color:var(--muted);font-size:11px">—</span>';

  content.innerHTML = `
    <div class="detail-top">
      <div class="detail-nicho-tag">${nicho.icon} ${nicho.name}</div>
      <div class="detail-name">${lead.name}</div>
      <div class="detail-addr">${lead.addr}</div>
      <div class="detail-row" style="margin-top:8px">
        <span class="detail-label">Telefone</span>
        <a class="tel-link" href="tel:${lead.phone}">${lead.phone}</a>
      </div>
      <div class="detail-row">
        <span class="detail-label">Avaliação</span>
        <span class="stars" style="font-size:12px">${renderStars(lead.rating)}</span>
        <span class="stars-count">${lead.rating} · ${lead.reviews.toLocaleString('pt-BR')} reviews</span>
      </div>
      <div class="detail-row" style="align-items:flex-start;gap:6px">
        <span class="detail-label" style="padding-top:3px">Links</span>
        ${linksHtml}
      </div>
    </div>

    <div>
      <div class="section-title"><span>📌 Observação do Lead</span></div>
      <div style="color:var(--muted);font-size:11px;line-height:1.7;padding:6px 0">${lead.obs}</div>
    </div>

    <div>
      <div class="section-title"><span>🔥 Prioridade</span></div>
      <div class="priority-grid">
        ${priorityOpts.map(([v,l,cls]) => `
          <button class="priority-opt ${cls}${curPriority===v?' active':''}" onclick="setPriority(${lead.id},'${v}',this)">${l}</button>
        `).join('')}
      </div>
    </div>

    <div>
      <div class="section-title"><span>📊 Status do Contato</span></div>
      <div class="status-grid">
        ${statusOpts.map(([v,l]) => `
          <button class="status-opt${curStatus===v?' active':''}" data-v="${v}" onclick="setStatus(${lead.id},'${v}',this)">${l}</button>
        `).join('')}
      </div>
    </div>

    <div>
      <div class="section-title"><span>📝 Suas Anotações</span></div>
      <textarea class="notes-field" id="notes-${lead.id}" placeholder="Observações, respostas, próximas ações...">${lead.customObs || ''}</textarea>
    </div>

    <div>
      <div class="section-title"><span>💬 Script de Abordagem (WhatsApp)</span></div>
      <div class="script-box" id="script-${lead.id}">${script}<button class="copy-btn" onclick="copyScript(${lead.id})">Copiar</button></div>
    </div>

    <button class="save-btn" onclick="saveDetail(${lead.id})">✓ Salvar Alterações</button>
  `;
}

function setPriority(id, val, btn) {
  btn.closest('.priority-grid').querySelectorAll('.priority-opt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const lead = getLead(id);
  if (!lead) return;
  lead.customPriority = val;
  // Atualiza o badge na linha da tabela imediatamente (sem salvar)
  const rowPrioEl = document.querySelector(`#row-${id} .priority`);
  if (rowPrioEl) {
    const map = { P1: ['p1','🔥 Alta'], P2: ['p2','⚡ Média'], P3: ['p3','❄️ Baixa'] };
    rowPrioEl.className = `priority ${map[val][0]}`;
    rowPrioEl.textContent = map[val][1];
  }
}

function setStatus(id, val, btn) {
  btn.closest('.status-grid').querySelectorAll('.status-opt').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const lead = getLead(id);
  if (!lead) return;
  lead.customStatus = val;
  // Atualiza o badge na linha da tabela imediatamente (sem salvar)
  const rowStatusEl = document.querySelector(`#row-${id} .status`);
  if (rowStatusEl) {
    const statusMap = {
      'nao-contatado': ['s-nao-contatado','Não contatado'],
      'contatado':     ['s-contatado','Contatado'],
      'interesse':     ['s-interesse','Demonstrou interesse'],
      'reuniao':       ['s-reuniao','Reunião agendada'],
      'fechado':       ['s-fechado','Fechado ✓'],
      'sem-interesse': ['s-sem-interesse','Sem interesse'],
    };
    const d = statusMap[val] || statusMap['nao-contatado'];
    rowStatusEl.className = `status ${d[0]}`;
    rowStatusEl.textContent = d[1];
  }
}

function saveDetail(id) {
  const lead = getLead(id);
  if (!lead) return;
  const notes = document.getElementById('notes-'+id);
  if (notes) lead.customObs = notes.value;

  const btn = document.querySelector('.save-btn');
  if (btn) {
    btn.disabled = true;
    btn.innerHTML = '<span class="btn-spinner"></span> Salvando...';
  }

  setTimeout(() => {
    saveLeads();
    renderTable(true); // noAnim = true, sem flash de animação
    const stillVisible = getVisibleLeads().find(l => l.id === id);
    const stageInfo = STAGE_LIST.find(s => s.key === (lead.customStatus || lead.status));
    if (stillVisible) {
      // Lead continua na etapa atual — mantém seleção
      setTimeout(() => {
        document.querySelectorAll('.lead-row').forEach(r => r.classList.remove('selected'));
        const row = document.getElementById('row-'+id);
        if (row) row.classList.add('selected');
      }, 10);
      if (btn) {
        btn.innerHTML = '✓ Salvo!';
        setTimeout(() => {
          btn.innerHTML = '✓ Salvar Alterações';
          btn.disabled = false;
        }, 1200);
      }
    } else {
      // Lead foi movido para outra etapa — fecha o painel
      selectedId = null;
      document.getElementById('detailEmpty').style.display = '';
      const content = document.getElementById('detailContent');
      content.classList.remove('visible');
      content.style.display = 'none';
      if (isDrawer()) {
        document.getElementById('detailPanel').classList.remove('mobile-open');
        document.getElementById('mobileOverlay').classList.remove('show');
        document.body.style.overflow = '';
      }
    }
    showToast(stageInfo ? `${stageInfo.icon} Movido para: ${stageInfo.label}` : '✓ Salvo com sucesso');
  }, 320);
}

function copyScript(id) {
  const el = document.getElementById('script-'+id);
  const text = el.textContent.replace('Copiar','').trim();
  navigator.clipboard.writeText(text).then(() => showToast('Script copiado!'));
}

function showToast(msg = '✓ Salvo com sucesso') {
  const t = document.getElementById('toast');
  t.textContent = msg.startsWith('✓') || msg.includes('→') ? msg : '✓ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ============================================================
// FILTERS
// ============================================================
function filterLeads(q) {
  searchQuery = q;
  const clearBtn = document.getElementById('searchClear');
  if (clearBtn) clearBtn.classList.toggle('show', q.length > 0);
  renderTable();
}

function clearSearch() {
  searchQuery = '';
  const inp = document.getElementById('searchInput');
  if (inp) inp.value = '';
  const clearBtn = document.getElementById('searchClear');
  if (clearBtn) clearBtn.classList.remove('show');
  renderTable();
}

function filterNicho(nicho, btn) {
  currentFilter = nicho;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

// ============================================================
// EXPORT CSV
// ============================================================
function exportCSV() {
  const visible = getVisibleLeads();
  const cols = ['ID','Nicho','Nome','Telefone','Avaliação','Reviews','Prioridade','Status','Obs Lead','Anotações'];
  const rows = visible.map(l => [
    l.id,
    nichos.find(n=>n.id===l.nicho)?.name || l.nicho,
    l.name,
    l.phone,
    l.rating,
    l.reviews,
    l.customPriority || l.priority,
    l.customStatus || l.status,
    l.obs,
    l.customObs || ''
  ].map(v => `"${String(v).replace(/"/g,'""')}"`));

  const csv = [cols.join(','), ...rows.map(r => r.join(','))].join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `prospecao_vilas_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ============================================================
// DRAWER — ativa quando viewport não cabe duas colunas
// Threshold: quando a coluna de detalhe ficaria < 240px
// ============================================================
const DRAWER_THRESHOLD = 660; // px — abaixo disso vai pra drawer

function isDrawer() { return document.body.classList.contains('drawer-mode'); }

function syncLayout() {
  const w = window.innerWidth;
  const drawer = w < DRAWER_THRESHOLD;
  document.body.classList.toggle('drawer-mode', drawer);

  // Ajusta altura do main para descontar o chrome real
  const chrome = document.querySelector('.header')?.offsetHeight +
                 document.querySelector('.stats-bar')?.offsetHeight +
                 (drawer ? 0 : document.querySelector('.pipeline-bar')?.offsetHeight || 0) +
                 document.querySelector('.toolbar')?.offsetHeight +
                 (drawer ? document.querySelector('.stage-sidebar')?.offsetHeight || 0 : 0) || 175;
  document.documentElement.style.setProperty('--chrome-h', chrome + 'px');
}

// Reage a qualquer mudança de tamanho (rotação, resize, teclado virtual)
const _ro = new ResizeObserver(() => syncLayout());
_ro.observe(document.documentElement);

function openMobilePanel() {
  document.getElementById('detailPanel').classList.add('mobile-open');
  document.getElementById('mobileOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeMobilePanel() {
  selectedId = null;
  document.querySelectorAll('.lead-row').forEach(r => r.classList.remove('selected'));
  document.getElementById('detailPanel').classList.remove('mobile-open');
  document.getElementById('mobileOverlay').classList.remove('show');
  document.body.style.overflow = '';
  document.getElementById('detailEmpty').style.display = '';
  const content = document.getElementById('detailContent');
  content.classList.remove('visible');
  content.style.display = 'none';
}

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && selectedId) {
    if (isDrawer()) { closeMobilePanel(); return; }
    selectedId = null;
    document.querySelectorAll('.lead-row').forEach(r => r.classList.remove('selected'));
    document.getElementById('detailEmpty').style.display = '';
    const content = document.getElementById('detailContent');
    content.classList.remove('visible');
    content.style.display = 'none';
  }
  if (e.ctrlKey && e.key === 's') {
    e.preventDefault();
    if (selectedId) saveDetail(selectedId);
  }
});

// ============================================================
// INIT
// ============================================================
syncLayout();
renderTable();
// animate stat counters on first load
setTimeout(() => animateCounters(['stat-total','stat-p1','stat-contatados','stat-fechados']), 100);
</script>
